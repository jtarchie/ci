{{ template "head" dict "Title" "Access Denied" }}

<main id="main-content" role="main"
  class="flex items-center justify-center min-h-screen">
  <div class="w-full max-w-md mx-auto p-8">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8 text-center">
      <div class="mb-6">
        <svg class="h-16 w-16 mx-auto text-red-500" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">
        {{ .Title }}
      </h1>
      <p class="text-gray-500 dark:text-gray-400 mb-6">{{ .Message }}</p>
      <a href="/auth/login"
        class="inline-block px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium"
        role="button">
        Sign In
      </a>
    </div>
  </div>
</main>

{{ template "footer" }}
