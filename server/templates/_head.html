{{ define "head" }}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{ .Title }} - PocketCI Server</title>
    <link rel="stylesheet" href="/static/bundle.css">
    <script src="/static/bundle.js" defer></script>
    <style>
      /* htmx indicator styles */
      .htmx-indicator { display: none; }
      .htmx-request .htmx-indicator { display: inline-flex; }
      .htmx-request .btn-text { display: none; }
      
      /* Skip to content link - visible on focus */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #000;
        color: #fff;
        padding: 8px;
        text-decoration: none;
        z-index: 100;
      }
      .skip-link:focus {
        top: 0;
      }
    </style>
  </head>
  <body
    class="bg-gray-100 dark:bg-gray-900 min-h-screen{{ if .BodyClass }} {{ .BodyClass }}{{ end }}"
    hx-ext="morph">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="poll-bar"
      class="fixed top-0 left-0 right-0 h-0.5 bg-blue-500 z-50 opacity-0 transition-opacity duration-200 pointer-events-none"
      aria-hidden="true"></div>
    {{ with currentUser }}
    <div
      class="flex justify-end px-4 py-1 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 text-sm">
      <div class="flex items-center gap-2 text-gray-600 dark:text-gray-300">
        {{ if .AvatarURL }}<img src="{{ .AvatarURL }}" alt
          class="w-5 h-5 rounded-full">{{ end }}
        <span>{{ .NickName }}</span>
        <a href="/auth/logout"
          class="text-blue-600 dark:text-blue-400 hover:underline ml-2">Logout</a>
      </div>
    </div>
    {{ end }}
    {{ end }}
