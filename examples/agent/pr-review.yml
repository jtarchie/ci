---
# Multi-agent GitHub PR review pipeline.
#
# Triggered by a GitHub pull_request webhook. Three specialist agents review
# the code sequentially; a final aggregator agent synthesises their feedback
# and a task step posts the result as a PR comment via the `gh` CLI.
#
# Required secrets:
#   GITHUB_TOKEN — Personal access token with repo + pull_request:write scope.
#              Set via: pocketci run --secret GITHUB_TOKEN=<token>
#
# Required setup:
#   Register a webhook in your GitHub repo pointing to:
#     http://<pocketci-host>/api/webhooks/<webhook-id>
#   with Content-Type: application/json and a shared secret configured in pocketci.
jobs:
  - name: review-pr
    triggers:
      webhook:
        filter: >-
          provider == "github" &&
          eventType == "pull_request" &&
          payload.action in ["opened", "synchronize"]
        params:
          PR_NUMBER: "string(payload.number)"
          PR_REPO: "'https://github.com/' + payload.pull_request.head.repo.full_name + '.git'"
          PR_HEAD_REF: "payload.pull_request.head.ref"
          PR_BASE_REF: "payload.pull_request.base.ref"
          GH_REPO: "payload.repository.full_name"
    plan:
      # ── 1. Clone the PR branch and generate the diff ─────────────────────
      - task: clone-pr
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: { repository: alpine/git }
          outputs:
            - name: diff
          run:
            path: sh
            args:
              - -c
              - |
                  git clone "$PR_REPO" repo
                  cd repo
                  git checkout "$PR_HEAD_REF"

                  # Fetch base branch from the upstream repository, not the PR head fork.
                  BASE_REPO="https://github.com/$GH_REPO.git"
                  git remote add upstream "$BASE_REPO" || git remote set-url upstream "$BASE_REPO"
                  git fetch upstream "$PR_BASE_REF"

                  git diff "upstream/$PR_BASE_REF"...HEAD > ../diff/pr.diff

                  DIFF_BYTES="$(wc -c < ../diff/pr.diff)"
                  if [ "$DIFF_BYTES" -eq 0 ]; then
                    echo "error: generated diff is empty for PR #$PR_NUMBER ($GH_REPO $PR_HEAD_REF -> $PR_BASE_REF)" >&2
                    exit 1
                  fi

      # ── 2a. Code-quality review ───────────────────────────────────────────
      - agent: code-quality-reviewer
        prompt: |
          Review the pull request changes in diff/pr.diff.
          Focus only on the changed lines: readability, naming, structure, and DRY violations.
          Be concise — bullet points only, no preamble.
          Include filename and line numbers for any issues.
        model: openrouter/openai/gpt-5.1-codex-mini
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: { repository: alpine/git }
          inputs:
            - name: diff
          outputs:
            - name: code-quality-output

      # ── 2b. Security review ───────────────────────────────────────────────
      - agent: security-reviewer
        prompt: |
          Audit the pull request changes in diff/pr.diff for security issues.
          Focus only on the changed lines: injection, authentication, data exposure, OWASP Top 10.
          Be concise — bullet points only, no preamble.
          Include filename and line numbers for any issues.
        model: openrouter/openai/gpt-5.1-codex-mini
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: { repository: alpine/git }
          inputs:
            - name: diff
          outputs:
            - name: security-output

      # ── 2c. Maintainability review ────────────────────────────────────────
      - agent: maintainability-reviewer
        prompt: |
          Evaluate the pull request changes in diff/pr.diff for maintainability.
          Focus only on the changed lines: test coverage, cyclomatic complexity, documentation.
          Be concise — bullet points only, no preamble.
          Include filename and line numbers for any issues.
        model: openrouter/openai/gpt-5.1-codex-mini
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: { repository: alpine/git }
          inputs:
            - name: diff
          outputs:
            - name: maintainability-output

      # ── 3. Aggregate and synthesize ───────────────────────────────────────
      #
      # The three prior agent outputs are available two ways:
      #   a) context.tasks — each review text is pre-injected into this
      #      agent's chat history as a synthetic get_task_result response,
      #      so no tool call is needed to read them.
      #   b) input volume mounts — result.json files are also mounted at
      #      code-quality-output/result.json, security-output/result.json,
      #      maintainability-output/result.json and can be cat'd via
      #      run_command if the agent needs to re-read raw content.
      - agent: final-reviewer
        prompt: |
          You have received three code reviews: code quality, security, and
          maintainability. Synthesize them into a single, concise GitHub PR
          comment written in JSON. Format:

          {
            "issues": [
              {
                "severity": "critical",
                "description": "Description of the issue",
                "file": "filename",
                "line": 123
              }
            ],
            "summary": "One sentence overall verdict"
          }
        model: openrouter/openai/gpt-5.1-codex-mini
        context:
          tasks:
            - name: code-quality-reviewer
              field: stdout
            - name: security-reviewer
              field: stdout
            - name: maintainability-reviewer
              field: stdout
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: { repository: alpine }
          inputs:
            - name: code-quality-output
            - name: security-output
            - name: maintainability-output
          outputs:
            - name: final-review

      # ── 4. Post the comment ───────────────────────────────────────────────
      - task: post-comment
        attempts: 2
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: { repository: maniator/gh }
          inputs:
            - name: final-review
          run:
            path: sh
            args:
              - -c
              - |
                  apk add --no-cache jq >/dev/null 2>&1
                  REVIEW=$(jq -r .text < final-review/result.json)
                  if [ -z "$REVIEW" ] || [ "$REVIEW" = "null" ]; then
                    echo "error: could not extract .text from final-review/result.json" >&2
                    cat final-review/result.json >&2
                    exit 1
                  fi
                  gh pr comment "$PR_NUMBER" --repo "$GH_REPO" --body "$REVIEW"
          env:
            GH_TOKEN: secret:GITHUB_TOKEN
